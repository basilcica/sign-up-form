    <div class="wrapper">
        <p class="page-title">Sign up</p>
        <div class="signup-card">
         <div class="left">
            <h1>Get Started Now</h1>

            <form>
                <label>Name</label>
                <input  class="insider" type="text" placeholder="Enter your name">
                <label>Email address</label>
                <input  class="insider" type="email" placeholder="Enter your email">
                <label>Password</label>
                <input class="insider" typr="password" placeholder="Enter your password"> 

                <lable class="check">
                    <input type="checkbox">
                    I agree with the<a href="#"> terms & policy</a>
                </lable>

                <button class="signup-btn">
                    Signup
                </button>
                <div class="divider">
                <hr>
                <span class="or">or</span>
                <hr>
                </div>
                
                <div class="social">
                <button href="#"><i class="bi bi-google"> </i>Sign in with Google</button>
                <button href="#"><i class="bi bi-apple"></i> Sign in with Apple</button>
                </div>

                <p class="login">Have an account? <a href="#">Sign in</a> </p>
        
            </form>
         </div>

        <div class="right-side">
            <img src="/images/Assignment-image.jpeg" alt="A flower">
        </div>
